name: gamer_rec
description: A Flutter Android gameplay recording application.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.0

  # Settings Persistence
  shared_preferences: ^2.2.0

  # File Paths
  path_provider: ^2.1.0

  # Permissions
  permission_handler: ^11.0.0

  # Sharing
  share_plus: ^7.2.1

  # Functional programming (Either)
  dartz: ^0.10.1

  # Intl for date formatting
  intl: ^0.18.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mockito: ^5.4.2
  build_runner: ^2.4.6
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true